<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採点結果 | Pandora</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f4ff; font-family: 'Hiragino Sans','Yu Gothic',sans-serif; color: #222; padding-bottom: 40px; }
  .header { background: linear-gradient(135deg,#1a9fd4,#0277bd); color: #fff; padding: 20px 16px; }
  .header h1 { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
  .header .meta { display: flex; gap: 14px; font-size: 12px; opacity: 0.9; }
  .body { padding: 14px 12px; max-width: 640px; margin: 0 auto; }
  .msg { text-align: center; padding: 60px 16px; color: #888; font-size: 13px; }
  .card { background: #fff; border-radius: 14px; margin-bottom: 14px; padding: 14px; border: 2px solid #dde3f0; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .card-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .qnum { background: #1a9fd4; color: #fff; border-radius: 6px; padding: 2px 9px; font-size: 12px; font-weight: bold; }
  .unit { background: #f5f5f5; color: #666; border-radius: 6px; padding: 2px 9px; font-size: 11px; }
  .badge { border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: bold; margin-left: auto; }
  .canvases { display: flex; flex-direction: column; gap: 10px; }
  .canvas-block .label { font-size: 11px; color: #5c6bc0; font-weight: bold; margin-bottom: 4px; }
  .stack { position: relative; line-height: 0; }
  .stack .base { width: 100%; display: block; border-radius: 8px; border: 1px solid #ddd; background: #fffde7; }
  .stack .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .empty { font-size: 12px; color: #aaa; padding: 10px; text-align: center; background: #fafafa; border-radius: 8px; }
  .teacher-block { margin-top: 12px; }
  .teacher-block .label { font-size: 11px; color: #cd4f7c; font-weight: bold; margin-bottom: 4px; }
  .teacher-img { width: 100%; border-radius: 8px; border: 1px dashed #cd4f7c; background: #fff; display: block; }
  .summary { text-align: center; }
  .summary-rate { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; }
  .rate-num { font-size: 36px; font-weight: bold; line-height: 1; }
  .rate-label { font-size: 12px; color: #888; margin-top: 2px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
  .stat { display: flex; flex-direction: column; align-items: center; background: #f7f8fc; border-radius: 10px; padding: 8px 4px; }
  .stat-num { font-size: 20px; font-weight: bold; }
  .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
  .summary-msg { font-size: 14px; font-weight: bold; color: #333; }
</style>
</head>
<body>
<div id="app"><div class="msg">読み込み中...</div></div>
<script>
const SUPABASE_URL = 'https://upmflhdbhbyzoeldrvvw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K8Y_bNHVA4szRXFM_EcDkA_LBckunu5';
const headers = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY };

const RESULT_BADGE = {
  correct:   { label: '✓ 正解',       bg: '#e8f5e9', color: '#2e7d32' },
  partial:   { label: '△ 式のみ正解', bg: '#fff3e0', color: '#e65100' },
  calc:      { label: '△ 計算ミス',   bg: '#fff3e0', color: '#f97316' },
  incorrect: { label: '✗ 不正解',     bg: '#ffebee', color: '#c62828' },
  ungraded:  { label: '⏳ 採点待ち',   bg: '#f5f5f5', color: '#888' },
};

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function gradeOf(r) {
  if (!r) return 'ungraded';
  if (r.grade_result) return r.grade_result;
  if (r.answer_correct) return 'correct';
  if (r.equation_correct) return 'partial';
  return 'incorrect';
}

function achievementMessage(rate) {
  if (rate >= 90) return '🌟 素晴らしい！ほぼ完璧だね！';
  if (rate >= 70) return '😊 よくできました！';
  if (rate >= 50) return '💪 もう少し復習してみよう';
  return '📚 一緒に復習しよう！';
}

function renderSummary(counts) {
  var graded = counts.correct + counts.partial + counts.calc + counts.incorrect;
  if (graded === 0) {
    return '<div class="card summary"><div class="msg" style="padding:16px 0">まだ採点中です。もう少し待ってね！</div></div>';
  }
  var rate = Math.round(counts.correct / graded * 100);
  var rateColor = rate >= 80 ? '#2e7d32' : rate >= 50 ? '#e65100' : '#c62828';
  return '<div class="card summary">' +
    '<div class="summary-rate">' +
      '<span class="rate-num" style="color:' + rateColor + '">' + rate + '%</span>' +
      '<span class="rate-label">正答率</span>' +
    '</div>' +
    '<div class="summary-grid">' +
      '<div class="stat"><span class="stat-num" style="color:#2e7d32">' + counts.correct + '</span><span class="stat-label">正解</span></div>' +
      '<div class="stat"><span class="stat-num" style="color:#e65100">' + counts.partial + '</span><span class="stat-label">式のみ正解</span></div>' +
      '<div class="stat"><span class="stat-num" style="color:#f97316">' + counts.calc + '</span><span class="stat-label">計算ミス</span></div>' +
      '<div class="stat"><span class="stat-num" style="color:#c62828">' + counts.incorrect + '</span><span class="stat-label">不正解</span></div>' +
    '</div>' +
    '<div class="summary-msg">' + achievementMessage(rate) + '</div>' +
  '</div>';
}

function renderCanvasBlock(label, baseImg, overlayImg) {
  if (!baseImg || baseImg === 'null') {
    return '<div class="canvas-block"><div class="label">' + label + '</div><div class="empty">未記入</div></div>';
  }
  return '<div class="canvas-block">' +
    '<div class="label">' + label + '</div>' +
    '<div class="stack">' +
      '<img class="base" src="' + baseImg + '">' +
      (overlayImg ? '<img class="overlay" src="' + overlayImg + '">' : '') +
    '</div>' +
  '</div>';
}

async function main() {
  const app = document.getElementById('app');
  const id = new URLSearchParams(location.search).get('id');
  if (!id) {
    app.innerHTML = '<div class="msg">提出IDが指定されていません（URLに ?id=... を付けてください）</div>';
    return;
  }

  let sub, results;
  try {
    const [subRes, resRes] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/submissions?id=eq.' + encodeURIComponent(id) + '&select=*', { headers }),
      fetch(SUPABASE_URL + '/rest/v1/results?submission_id=eq.' + encodeURIComponent(id) + '&select=*', { headers }),
    ]);
    const subs = await subRes.json();
    results = await resRes.json();
    sub = subs && subs[0];
  } catch (e) {
    app.innerHTML = '<div class="msg">読み込みに失敗しました</div>';
    return;
  }
  if (!sub) {
    app.innerHTML = '<div class="msg">提出データが見つかりません</div>';
    return;
  }

  const sd = typeof sub.submission_data === 'string' ? JSON.parse(sub.submission_data) : (sub.submission_data || {});
  const problems = sd.problems || [];
  const resultsByPid = {};
  (results || []).forEach(function(r) { resultsByPid[String(r.problem_id)] = r; });

  const d = sub.submitted_at ? new Date(sub.submitted_at) : null;
  const dateStr = d ? (d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate()) : '';

  let html = '<div class="header">' +
    '<h1>📋 採点結果</h1>' +
    '<div class="meta">' +
      '<span>🎓 ' + esc(sub.student_name || '-') + '</span>' +
      (dateStr ? '<span>📅 ' + dateStr + '</span>' : '') +
    '</div>' +
  '</div>';

  html += '<div class="body">';

  if (problems.length === 0) {
    html += '<div class="msg">問題データがありません</div>';
  }

  const counts = { correct: 0, partial: 0, calc: 0, incorrect: 0 };
  problems.forEach(function(p, i) {
    const g = gradeOf(resultsByPid[String(p.problem_id || p.id || (i + 1))]);
    if (counts.hasOwnProperty(g)) counts[g]++;
  });
  if (problems.length > 0) html += renderSummary(counts);

  problems.forEach(function(p, i) {
    const pid = String(p.problem_id || p.id || (i + 1));
    const r = resultsByPid[pid];
    const grade = gradeOf(r);
    const badge = RESULT_BADGE[grade];
    let redPen = {};
    if (r && r.red_pen_canvas) {
      redPen = typeof r.red_pen_canvas === 'string' ? JSON.parse(r.red_pen_canvas) : r.red_pen_canvas;
    }

    html += '<div class="card">';
    html += '<div class="card-head">' +
      '<span class="qnum">Q' + (i + 1) + '</span>' +
      (p.unit || p.chapter ? '<span class="unit">' + esc(p.unit || p.chapter) + '</span>' : '') +
      '<span class="badge" style="background:' + badge.bg + ';color:' + badge.color + '">' + badge.label + '</span>' +
    '</div>';

    html += '<div class="canvases">';
    html += renderCanvasBlock('✏️ 式', p.equation_canvas, redPen.equation);
    html += renderCanvasBlock('🔢 答え', p.answer_canvas, redPen.answer);
    html += '</div>';

    if (r && r.teacher_canvas) {
      html += '<div class="teacher-block">' +
        '<div class="label">📝 先生のコメント</div>' +
        '<img class="teacher-img" src="' + r.teacher_canvas + '">' +
      '</div>';
    }

    html += '</div>';
  });

  html += '</div>';
  app.innerHTML = html;
}

main();
</script>
</body>
</html>
