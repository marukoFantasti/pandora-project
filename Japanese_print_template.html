<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語 印刷テンプレート</title>
<style>
:root{
  --bg:#f2efe9; --card:#ffffff; --border:#d8d0c2;
  --text1:#2b2622; --text2:#5a5248; --text3:#948a7c;
  --accent:#b0486f; --accent-bg:#fbeef3; --accent-text:#8e3a59;
  --red:#c0392b; --red-bg:#fdeeec; --green:#2e7d4f; --green-bg:#e9f5ee;
}
/* ダークテーマ（画面プレビュー用。印刷は@media printで常にライト強制） */
body.theme-dark{
  --bg:#161616; --card:#212121; --border:#333333;
  --text1:#f0f0f0; --text2:#c4c4c4; --text3:#8a8a8a;
  --accent:#cd4f7c; --accent-bg:#3a1f28; --accent-text:#f2a3bd;
  --red:#ff6b6b; --red-bg:#3a1a1a; --green:#5fd58d; --green-bg:#173425;
}
/* Iモード（画面プレビューの操作系を大きく。印刷レイアウトには影響しない） */
body.imode{ font-size:16px; }
body.imode .setup-input, body.imode .tbtn, body.imode select, body.imode input, body.imode textarea{ font-size:15px; }
body.imode .setup-label{ font-size:13px; }
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  background:var(--bg); color:var(--text1); font-size:14px; line-height:1.7;
}
.toolbar{
  padding:14px 20px; background:var(--card); border-bottom:2px solid var(--accent);
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.toolbar-title{font-size:15px; font-weight:800; margin-right:auto;}
.toolbar-title span{color:var(--accent)}
.tbtn{
  font-family:inherit; font-size:12px; background:var(--card); color:var(--text2);
  border:1px solid var(--border); border-radius:8px; padding:8px 14px; cursor:pointer;
}
.tbtn.primary{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700;}
.setup-wrap{max-width:720px; margin:24px auto; padding:0 16px;}
.card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px;}
.section-label{font-size:12px; font-weight:800; color:var(--accent-text); border-left:4px solid var(--accent); padding-left:8px; margin-bottom:12px;}
.setup-label{font-size:12px; color:var(--text3); display:block; margin-bottom:5px; margin-top:12px;}
.setup-input{width:100%; font-family:inherit; font-size:14px; background:#fff; color:var(--text1); border:1px solid var(--border); border-radius:8px; padding:10px 12px;}
.notice{padding:10px 13px; border-radius:8px; font-size:13px; margin-top:12px}
.notice-err{background:var(--red-bg); color:var(--red)}
.notice-info{background:var(--green-bg); color:var(--green)}

/* ===== 印刷ページ =====
   教訓：@page marginと.pageのheight/paddingの二重管理はページ増殖を招く。
   @page margin:0 とし、.page自体（210mm×297mm＋padding）で余白を一元管理する。 */
@page{ size:A4; margin:0; }
.pages-area{padding:20px 0 80px;}
.page{
  width:210mm; height:297mm; padding:15mm;
  background:#fff; margin:0 auto 16px; position:relative;
  box-shadow:0 2px 10px rgba(0,0,0,.12); overflow:hidden;
}
.page-header{
  display:flex; align-items:center; gap:10px; border-bottom:2px solid #333;
  padding-bottom:3mm; margin-bottom:5mm;
}
.page-header .ph-title{font-size:14pt; font-weight:800;}
.page-header .ph-meta{font-size:9pt; color:#555;}
.page-header .ph-name{margin-left:auto; display:flex; align-items:center; gap:2mm; color:#333;}
.page-header .ph-name .ph-sid{font-size:8pt; color:#555;}
.page-header .ph-name .name-label{font-size:10pt; font-weight:700; color:#000;}
.page-header .ph-namebox{display:inline-block; width:60mm; height:10mm; border:1px solid #333; border-radius:1mm;}
/* 解答用紙は右上にQR（位置・サイズ不変）があるため、名前欄と衝突しないよう
   ヘッダー右側にQR footprint分の余白を確保する。QR自体は動かさない。 */
.answer-page .page-header{padding-right:42mm;}
.page-footer{
  position:absolute; bottom:8mm; left:0; right:0; text-align:center;
  font-size:8pt; color:#888;
}

.passage-block{font-size:10.5pt; line-height:1.9; margin-bottom:2.5mm;}
.passage-block .para-num{
  display:inline-block; border:1px solid #333; font-size:8pt; font-weight:700;
  border-radius:2px; padding:0 1.5mm; margin-right:1.5mm;
}
.q-block{margin-bottom:4mm; page-break-inside:avoid;}
.q-block .q-head{font-size:10.5pt; font-weight:800; margin-bottom:1mm;}
.q-block .q-text{font-size:10.5pt; line-height:1.8;}
.q-block .q-choices{font-size:10.5pt; line-height:1.9; margin-top:1mm; padding-left:4mm; white-space:pre-wrap;}

/* 解答用紙 */
.as-qr-wrap{
  position:absolute; top:10mm; right:10mm; background:#fff;
  padding:2.5mm; /* クワイエットゾーン2.5mm（実機読み取り精度のため） */
}
.as-qr-wrap canvas{display:block; width:25mm; height:25mm;}
.as-field{margin-bottom:6mm;}
.as-field .as-label{font-size:10.5pt; font-weight:800; margin-bottom:1.5mm;}
.as-choice-box{
  width:22mm; height:12mm; border:1.5px solid #333; border-radius:1mm;
  display:inline-block;
}
.as-grid{display:flex; flex-wrap:wrap; gap:0;}
.as-cell{
  width:9mm; height:9mm; border:1px solid #555; margin-right:-1px; margin-bottom:-1px;
}
.as-lines{border:1.5px solid #333; border-radius:1mm;}
.as-line{border-bottom:1px dashed #aaa; height:11mm;}
.as-line:last-child{border-bottom:none;}
.as-note{font-size:8pt; color:#777; margin-top:0.5mm;}

/* 画面/印刷の出し分け */
@media print{
  /* 画面テーマ（ライト/ダーク）に関わらず、印刷は常にライト（白地・黒文字）に強制。
     テーマ変数もライト固定に上書きし、ダークプレビュー中でも紙は白黒で出る。 */
  html, body, body.theme-dark{
    background:#fff !important; color:#000 !important;
    --bg:#ffffff; --card:#ffffff; --border:#d8d0c2;
    --text1:#000000; --text2:#333333; --text3:#555555;
  }
  .page{ background:#fff !important; }
  .page, .page *{ color:#000 !important; }
  .toolbar, .setup-wrap, .no-print{display:none !important;}
  .pages-area{padding:0;}
  .page{box-shadow:none; margin:0; page-break-after:always;}
  .page:last-child{page-break-after:auto;}
  body.print-question .answer-page{display:none !important;}
  body.print-answer .question-page{display:none !important;}
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">国語 <span>印刷テンプレート</span></div>
  <a class="tbtn" href="pandora_main.html" style="text-decoration:none;">← Pandoraメイン</a>
  <span id="flowProgress" style="display:inline-flex; align-items:center; gap:4px; flex-wrap:wrap;"></span>
  <button class="tbtn" onclick="printOnly('question')">🖨 問題用紙のみ印刷</button>
  <button class="tbtn" onclick="printOnly('answer')">🖨 解答用紙のみ印刷</button>
  <button class="tbtn primary" onclick="printOnly('both')">🖨 両方印刷</button>
  <button class="tbtn" onclick="exportLayoutData()">📐 layout_dataを書き出す</button>
  <button class="tbtn" onclick="registerAnswerSheets()">☁️ answer_sheetsに登録</button>
  <button class="tbtn" id="themeBtn" onclick="toggleTheme()" style="margin-left:8px;">🌙 ダーク</button>
  <button class="tbtn" id="imodeBtn" onclick="toggleImode()">🤍 Iモード</button>
</div>

<div class="setup-wrap" id="setupWrap">
  <div class="card">
    <div class="section-label">問題セットの読み込みと印刷設定</div>
    <div id="handoffBanner"></div>
    <label class="setup-label">問題セット（japanese_question_set_*.json）</label>
    <input type="file" id="setFileInput" accept="application/json" class="setup-input" onchange="loadQuestionSetFile(event)">
    <label class="setup-label">またはコピーした問題セットを貼り付け</label>
    <textarea id="pasteArea" class="setup-input" rows="3" placeholder="国語問題ジェネレーターの「📋 問題セットをコピー」の内容を貼り付けて、下のボタンを押してください" style="resize:vertical;"></textarea>
    <button class="tbtn" style="margin-top:8px;" onclick="loadPastedSet()">📋 貼り付けた内容を読み込む</button>
    <label class="setup-label">assignment_id（空欄なら自動生成）</label>
    <input type="text" id="setupAssignmentId" class="setup-input" placeholder="空欄で自動生成">
    <label class="setup-label">生徒（Lethe名簿から選択。取得失敗時は手入力）</label>
    <select id="setupStudentId" class="setup-input" onchange="hoSaveStudent('setupStudentId')"><option value="">読み込み中...</option></select>
    <input type="text" id="setupStudentId_text" class="setup-input" placeholder="S-0000" style="display:none">
    <button class="tbtn primary" style="margin-top:16px; width:100%; padding:12px;" onclick="buildPages()">📄 問題用紙・解答用紙を組む</button>
    <div id="setupNotice"></div>
    <div id="nextGuide"></div>
    <div style="font-size:11px; color:var(--text3); margin-top:12px; line-height:1.7;">
      漢字クイズはデジタル専用のため、印刷版には含まれません。QRコードはPandora互換形式（assignment_id / student_id / page / total_pages）です。
    </div>
  </div>
</div>

<div class="pages-area" id="pagesArea"></div>

<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php

// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};

const LETHE_URL = "https://script.google.com/macros/s/AKfycbxlXsrnt14jxxZrnKUSSdq4KG8LU96eDTPjrkyXdSGZ-Gmehha5HHNPMZTnQo6OrIy7oA/exec";
async function loadStudentsIntoSelect(selectId, textId){
  const sel = document.getElementById(selectId);
  const txt = textId ? document.getElementById(textId) : null;
  if(!sel) return;
  try{
    const res = await fetch(LETHE_URL + '?action=getStudents');
    const d = await res.json();
    if(!d.success || !Array.isArray(d.students) || d.students.length === 0) throw new Error(d.error || 'no students');
    sel.innerHTML = '<option value="">選択してください</option>' + d.students.map(function(s){
      const label = escapeHtml(s.student_id + (s.name ? ' ' + s.name : ''));
      return '<option value="' + escapeHtml(s.student_id) + '" data-name="' + escapeHtml(s.name || '') + '">' + label + '</option>';
    }).join('');
    sel.style.display = '';
    if(txt) txt.style.display = 'none';
  }catch(e){
    console.warn('[loadStudentsIntoSelect] Lethe不達、手入力にフォールバック:', e);
    if(txt){ txt.style.display = ''; sel.style.display = 'none'; }
    else { sel.innerHTML = '<option value="">（名簿取得失敗・再読込してください）</option>'; }
  }
}
function studentIdValue(selectId, textId){
  const sel = document.getElementById(selectId);
  const txt = textId ? document.getElementById(textId) : null;
  let v = sel && sel.value ? sel.value : '';
  if(!v && txt) v = txt.value;
  return (v || '').trim();
}
function selectedStudentName(selectId){

function gradeToInt(g){ return g ? (parseInt(String(g).replace(/[^0-9]/g,''),10) || null) : null; }

// 問題セットを assignment_data 用に要約する。photo_intakeの取込時、印刷提出の
// problems[]（layout由来でproblem_id/type/answer_canvasしか無い）へ
// question_text/answer/kanten等をマージする元データになる。
// problem_id は印刷レイアウトの 'q'+number と一致させる（buildLayoutData準拠）。
function summarizeQuestions(qs){
  return ((qs && qs.questions) || []).map(function(q, idx){
    const n = (q.number != null) ? q.number : (idx + 1);
    return {
      problem_id: 'q' + n,
      number: n,
      type: q.type || null,
      kanten: q.kanten || null,
      question_text: q.question_text || null,
      choices: q.choices || [],
      answer: q.answer || null,
      explanation: q.explanation || null,
      _actualCount: (q._actualCount != null ? q._actualCount : null)
    };
  });
}

// PostgRESTのエラー本文からcodeを読み、原因別の日本語ヒントを返す。
// 23502=必須列不足 / 23503=FK違反 / 401,403=権限(RLS)。誤誘導を避けるため出し分ける。
function sbErrorMessage(status, bodyText){
  let code = '', detail = '';
  try{ const j = JSON.parse(bodyText); code = j.code || ''; detail = j.message || j.details || ''; }catch(e){ detail = (bodyText || '').slice(0,150); }
  if(code === '23502') return '必須列が不足しています（NOT NULL違反）。送信ペイロードに必須列が揃っているか確認してください。詳細：' + detail;
  if(code === '23503') return '関連レコードが未登録です（外部キー違反）。students/assignmentsの登録を先に済ませてください。詳細：' + detail;
  if(status === 401 || status === 403) return 'アクセス権限がありません（RLS）。Supabaseで該当テーブルのanon insert権限を確認してください（HTTP ' + status + '）。';
  return 'HTTP ' + status + ' ' + (detail || (bodyText || '').slice(0,150));
}

// ===== マスターミラー同期：students テーブルへのUPSERT =====
// Letheがマスター、Supabase students は従属ミラー。assignments.student_id が
// students.id を参照するFKのため、印刷配布（answer_sheets登録）時に生徒行を用意する。
// on_conflict=id + ignore-duplicates（無ければ挿入・あれば触らない。既存nameは保護）。
// ⚠️ students.id は text型でS-XXXXを明示送信。
async function upsertStudentMirror(studentId, name, gradeNum){
  if(!studentId) return;
  const row = { id: studentId, name: (name && name.trim()) ? name.trim() : '(未登録)' };
  if(gradeNum != null) row.grade = gradeNum;
  const res = await fetch(SUPABASE_URL + '/rest/v1/students?on_conflict=id', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Prefer': 'resolution=ignore-duplicates,return=minimal'
    },
    body: JSON.stringify(row)
  });
  if(!res.ok){ const t = await res.text(); throw new Error('students同期: ' + sbErrorMessage(res.status, t)); }
}

function loadQuestionSetFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{ tryParseSet(e.target.result); };
  reader.readAsText(file, 'utf-8');
}

function tryParseSet(raw){
  try{
    const parsed = JSON.parse(raw);
    if(parsed.recordType !== 'japanese_question_set'){
      setupNotice('問題セット形式ではないようです。', 'err');
      return;
    }
    QUESTION_SET = parsed;
    setupNotice('問題セットを読み込みました：' + (parsed.sourceTitle || '(無題)') + '（' + (parsed.questions||[]).length + '問）', 'info');
  }catch(err){
    setupNotice('読み込みに失敗しました：' + err.message, 'err');
  }
}

// ===== ブロック計測ベースのページ組版 =====
// 各ブロック（段落・設問・解答欄）を計測用コンテナで実測し、ページ高さに収まるよう詰めていく
function measureAndPack(blocks, makePage){
  const measurer = document.createElement('div');
  measurer.style.cssText = 'position:absolute; visibility:hidden; width:' + CONTENT_W + 'mm; left:-9999px; top:0;';
  document.body.appendChild(measurer);
  blocks.forEach(b=>measurer.appendChild(b.el));
  const heights = blocks.map(b=>b.el.getBoundingClientRect().height / PX_PER_MM);
  blocks.forEach(b=>measurer.removeChild(b.el));
  document.body.removeChild(measurer);

  const pages = [];
  let current = null, used = 0;
  blocks.forEach((b, i)=>{
    const h = heights[i];
    const headerH = 14; // ページヘッダー概算(mm)
    const budget = CONTENT_H - headerH;
    if(!current || used + h > budget){
      current = makePage(pages.length + 1);
      pages.push(current);
      used = 0;
    }
    current.contentEl.appendChild(b.el);
    used += h;
  });
  return pages;
}

function makePageShell(kind, pageNum, headerRight){
  const page = document.createElement('div');
  page.className = 'page ' + (kind === 'question' ? 'question-page' : 'answer-page');
  const qs = QUESTION_SET;
  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML =
    '<span class="ph-title">' + escapeHtml(qs.sourceTitle || '国語') + (kind === 'answer' ? '（解答用紙）' : '') + '</span>' +
    '<span class="ph-meta">' + escapeHtml((qs.gradeLabel||'') + '・' + (qs.genreLabel||'') + '・' + (qs.difficultyLabel||'')) + '</span>' +
    (headerRight || '<span class="ph-name"><span class="name-label">名前</span><span class="ph-namebox"></span></span>');
  page.appendChild(header);
  const content = document.createElement('div');
  page.appendChild(content);
  const footer = document.createElement('div');
  footer.className = 'page-footer';
  footer.textContent = (kind === 'question' ? '問題用紙' : '解答用紙') + ' - ' + pageNum;
  page.appendChild(footer);
  page.contentEl = content;
  return page;
}

function buildPages(){
  if(!QUESTION_SET){ setupNotice('先に問題セットを読み込んでください。', 'err'); return; }
  ASSIGNMENT_ID = document.getElementById('setupAssignmentId').value.trim() || genAssignmentId();
  document.getElementById('setupAssignmentId').value = ASSIGNMENT_ID;
  STUDENT_ID = studentIdValue('setupStudentId', 'setupStudentId_text');
  if(!STUDENT_ID){ setupNotice('生徒を選択（または手入力）してください（例：S-0018）。', 'err'); return; }

  const area = document.getElementById('pagesArea');
  area.innerHTML = '';
  const qs = QUESTION_SET;

  // ---- 問題用紙のブロック ----
  const qBlocks = [];
  (qs.fullText || '').split(/\n+/).filter(s=>s.trim()).forEach((p, i)=>{
    const div = document.createElement('div');
    div.className = 'passage-block';
    div.innerHTML = '<span class="para-num">' + (i+1) + '</span>' + escapeHtml(p);
    qBlocks.push({ el: div });
  });
  const sep = document.createElement('div');
  sep.style.cssText = 'border-top:1px solid #333; margin:4mm 0;';
  qBlocks.push({ el: sep });
  (qs.questions || []).forEach((q, idx)=>{
    const n = q.number != null ? q.number : idx+1;
    const div = document.createElement('div');
    div.className = 'q-block';
    let html = '<div class="q-head">問' + escapeHtml(n) + '</div>'
      + '<div class="q-text">' + escapeHtml(q.question_text || '') + '</div>';
    if(q.choices && q.choices.length){
      html += '<div class="q-choices">' + q.choices.map(c=>escapeHtml(c)).join('\n') + '</div>';
    }
    div.innerHTML = html;
    qBlocks.push({ el: div });
  });
  const qPages = measureAndPack(qBlocks, (n)=>makePageShell('question', n));

  // ---- 解答用紙のブロック ----
  const aBlocks = [];
  (qs.questions || []).forEach((q, idx)=>{
    const n = q.number != null ? q.number : idx+1;
    const div = document.createElement('div');
    div.className = 'as-field';
    div.dataset.problemId = 'q' + n;
    div.dataset.qtype = q.type || '';
    let inner = '<div class="as-label">問' + escapeHtml(n) + '（' + escapeHtml(q.type || '') + '）</div>';
    const isChoice = q.choices && q.choices.length;
    const isExtraction = (q.type || '').includes('抜き出し');
    if(isChoice){
      inner += '<div class="as-choice-box as-target"></div><div class="as-note">記号で答えましょう</div>';
    }else if(isExtraction){
      const count = q._actualCount || 20;
      let cells = '';
      for(let i=0;i<count;i++) cells += '<div class="as-cell"></div>';
      inner += '<div class="as-grid as-target">' + cells + '</div><div class="as-note">' + count + '字（句読点をふくむ）</div>';
    }else{
      inner += '<div class="as-lines as-target"><div class="as-line"></div><div class="as-line"></div><div class="as-line"></div></div>';
    }
    div.innerHTML = inner;
    aBlocks.push({ el: div });
  });
  const qrHeaderRight = '<span class="ph-name"><span class="ph-sid">' + escapeHtml(STUDENT_ID) + '</span><span class="name-label">名前</span><span class="ph-namebox"></span></span>';
  const aPages = measureAndPack(aBlocks, (n)=>makePageShell('answer', n, qrHeaderRight));

  // 解答用紙にQRを載せる（各ページ・Pandora互換ペイロード）
  aPages.forEach((page, i)=>{
    const payload = JSON.stringify({
      assignment_id: ASSIGNMENT_ID,
      student_id: STUDENT_ID,
      page: i+1,
      total_pages: aPages.length
    });
    const wrap = document.createElement('div');
    wrap.className = 'as-qr-wrap';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    page.appendChild(wrap);
    drawQr(canvas, payload);
    // QRと重ならないよう、コンテンツ先頭に余白
    page.contentEl.style.paddingTop = '18mm';
  });

  qPages.forEach(p=>area.appendChild(p));
  aPages.forEach(p=>area.appendChild(p));

  // layout_data（mm座標系・A4）を実測から生成
  buildLayoutData(aPages);

  setupNotice('組版しました：問題用紙' + qPages.length + 'ページ＋解答用紙' + aPages.length + 'ページ。上のボタンから印刷できます。', 'info');
  window.scrollTo({ top: document.getElementById('pagesArea').offsetTop - 10, behavior: 'smooth' });
}

function drawQr(canvas, text){
  const qr = qrcode(0, 'H'); // 誤り訂正レベルH（Pandora実証済み設定）
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const size = Math.round(25 * PX_PER_MM * 2); // 高解像度で描画
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000';
  const cell = size / count;
  for(let r=0;r<count;r++){
    for(let c=0;c<count;c++){
      if(qr.isDark(r, c)){
        ctx.fillRect(Math.floor(c*cell), Math.floor(r*cell), Math.ceil(cell), Math.ceil(cell));
      }
    }
  }
}

// 解答欄の実測位置をmm座標系（ページ左上原点・A4=210×297mm）でlayout_dataに変換
function buildLayoutData(aPages){
  const fields = [];
  aPages.forEach((page, pi)=>{
    const pageRect = page.getBoundingClientRect();
    page.querySelectorAll('.as-field').forEach(f=>{
      const target = f.querySelector('.as-target');
      const r = (target || f).getBoundingClientRect();
      fields.push({
        problem_id: f.dataset.problemId,
        type: f.dataset.qtype,
        page: pi + 1,
        x_mm: +( (r.left - pageRect.left) / PX_PER_MM ).toFixed(1),
        y_mm: +( (r.top - pageRect.top) / PX_PER_MM ).toFixed(1),
        w_mm: +( r.width / PX_PER_MM ).toFixed(1),
        h_mm: +( r.height / PX_PER_MM ).toFixed(1)
      });
    });
  });
  LAYOUT_DATA = {
    recordType: 'japanese_answer_sheet_layout',
    version: 1,
    assignment_id: ASSIGNMENT_ID,
    student_id: STUDENT_ID,
    subject: 'japanese',
    page_size: { w_mm: PAGE_W, h_mm: PAGE_H },
    qr: { x_mm: PAGE_W - 10 - 25 - 2.5, y_mm: 10, size_mm: 25, quiet_zone_mm: 2.5 },
    total_pages: aPages.length,
    fields: fields,
    createdAt: new Date().toISOString()
  };
  ANSWER_SHEETS_REGISTERED = false; // 組み直したら未登録扱いに戻す
}

function exportLayoutData(){
  if(!LAYOUT_DATA){ setupNotice('先に「問題用紙・解答用紙を組む」を実行してください。', 'err'); return; }
  const blob = new Blob([JSON.stringify(LAYOUT_DATA, null, 2)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'answer_sheet_layout_' + STUDENT_ID + '_' + ASSIGNMENT_ID + '.json';
  a.click();
  URL.revokeObjectURL(url);
  setupNotice('layout_dataを書き出しました。photo_intake統合時にanswer_sheetsテーブルへ登録する元データです。', 'info');
}

// answer_sheetsテーブルへlayout_dataを登録する（photo_intakeがQRのpageで引く導線）。
// photo_intakeは assignment_id + student_id + page=eq.N で1ページ1行を前提に読むため、
// LAYOUT_DATAをページ別に分割し、1ページ=1行でPOSTする。
// 再登録時に重複しないよう、同一 assignment_id + student_id の既存行を先に削除する。
async function registerAnswerSheets(){
  if(!LAYOUT_DATA){ setupNotice('先に「問題用紙・解答用紙を組む」を実行してください。', 'err'); return; }
  // FK連鎖（submissions→assignments→students）を印刷配布の時点で満たしておく。
  // ①students（マスターミラー）→②assignments を先に用意（photo_intake取込時の
  // FK違反を防ぐ）。失敗したらanswer_sheets登録に進まず中断する。
  try{
    await upsertStudentMirror(STUDENT_ID, selectedStudentName('setupStudentId'), gradeToInt(QUESTION_SET && QUESTION_SET.grade));
    await upsertJapaneseAssignment();
  }catch(e){
    setupNotice('生徒(students)または課題(assignments)の登録に失敗しました：' + e.message, 'err');
    return;
  }
  const total = LAYOUT_DATA.total_pages || 1;
  const sbHeaders = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
  };
  try{
    // 既存行を削除（再登録の冪等化）
    await fetch(SUPABASE_URL + '/rest/v1/answer_sheets?assignment_id=eq.' + encodeURIComponent(ASSIGNMENT_ID) +
      '&student_id=eq.' + encodeURIComponent(STUDENT_ID), {
      method: 'DELETE',
      headers: Object.assign({}, sbHeaders, { 'Prefer': 'return=minimal' })
    });
    // ページ別に1行ずつ登録（total_pagesはNOT NULL列なので必ず送る）
    const rows = [];
    for(let p = 1; p <= total; p++){
      const pageFields = (LAYOUT_DATA.fields || []).filter(function(f){ return f.page === p; });
      rows.push({
        assignment_id: ASSIGNMENT_ID,
        student_id: STUDENT_ID,
        page: p,
        total_pages: total,
        layout_data: Object.assign({}, LAYOUT_DATA, { fields: pageFields })
      });
    }
    const res = await fetch(SUPABASE_URL + '/rest/v1/answer_sheets', {
      method: 'POST',
      headers: Object.assign({}, sbHeaders, { 'Prefer': 'return=minimal' }),
      body: JSON.stringify(rows)
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error(sbErrorMessage(res.status, t));
    }
    ANSWER_SHEETS_REGISTERED = true;
    setupNotice('answer_sheetsに登録しました（' + total + 'ページ分）。photo_intakeでQRを読み取ると照合されます。', 'info');
    showNextGuide('✅ 登録が完了しました。<br>このまま印刷してください（上の「🖨 両方印刷」など）。回収した解答用紙は、<b>photo_intake</b>で写真を取り込むと採点UIに届きます。');
  }catch(e){
    setupNotice('answer_sheetsへの登録に失敗しました：' + e.message, 'err');
  }
}

async function printOnly(mode){
  if(!QUESTION_SET || !document.querySelector('.page')){
    setupNotice('先に「問題用紙・解答用紙を組む」を実行してください。', 'err');
    return;
  }
  // 解答用紙を印刷する場合（answer / both）、answer_sheets未登録のまま印刷すると
  // photo_intakeがlayout_dataを引けず採点に取り込めない。未登録なら確認→登録→印刷。
  const printsAnswer = (mode === 'answer' || mode === 'both');
  if(printsAnswer && LAYOUT_DATA && !ANSWER_SHEETS_REGISTERED){
    const ok = confirm('解答用紙がまだ answer_sheets に登録されていません。\n登録しないと、写真取り込み（photo_intake）で採点データに紐づけられません。\n\n「OK」で今すぐ登録してから印刷します。');
    if(!ok) return;
    await registerAnswerSheets();
    if(!ANSWER_SHEETS_REGISTERED){
      // 登録失敗（setupNoticeにエラー表示済み）。印刷せず中断。
      return;
    }
  }
  document.body.classList.remove('print-question', 'print-answer');
  if(mode === 'question') document.body.classList.add('print-question');
  if(mode === 'answer') document.body.classList.add('print-answer');
  window.print();
}

// 起動時に生徒名簿を読み込む（Lethe不達時は手入力にフォールバック）
loadStudentsIntoSelect('setupStudentId', 'setupStudentId_text').then(function(){ hoPresetStudent('setupStudentId'); });

renderFlowProgress('print'); // 工程進行バー
initTheme(); initImode(); // ライト/ダーク＋Iモード（印刷は常にライト）
</script>
